<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>📈 Seus Gastos</h2>

<div id="total"></div>
<div id="essencial"></div>
<div id="superfluo"></div>

<button onclick="voltar()">Voltar</button>

<script src="script.js"></script>
<script>
  carregarDashboard();

  function carregarDashboard() {
  const historico = JSON.parse(localStorage.getItem("notas")) || [];

  let totais = {
    essenciais: 0,
    complementares: 0,
    superfluos: 0
  };

  historico.forEach(nota => {
    totais.essenciais += nota.essenciais || 0;
    totais.complementares += nota.complementares || 0;
    totais.superfluos += nota.superfluos || 0;
  });

  console.log(totais);
}

carregarDashboard();
</script>

</body>
</html>
