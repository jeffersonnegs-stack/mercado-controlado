<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>📈 Seus Gastos</h2>

<section>
  <h3>Total do mês</h3>
  <div id="totalMes">Carregando...</div>
</section>

<section>
  <h3>Distribuição de gastos</h3>

  <div>
    <strong>Essencial</strong>
    <div id="valorEssencial">R$ 0,00</div>
    <small id="pctEssencial">0% do total</small>
  </div>

  <div>
    <strong>Complementar</strong>
    <div id="valorComplementar">R$ 0,00</div>
    <small id="pctComplementar">0% do total</small>
  </div>

  <div>
    <strong>Supérfluo</strong>
    <div id="valorSuperfluo">R$ 0,00</div>
    <small id="pctSuperfluo">0% do total</small>
  </div>
</section>

<section>
  <h3>Score</h3>
  <div><span id="score">0</span> de 100 pontos</div>
</section>

<section>
  <h3>Previsão do mês</h3>
  <div id="previsaoMes">R$ 0,00</div>
</section>

<button onclick="voltar()">Voltar</button>

<script src="script.js"></script>
<script>
  carregarDashboard();

  function voltar() {
    window.history.back();
  }
</script>

</body>
</html>
