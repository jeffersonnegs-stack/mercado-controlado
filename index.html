<style>
:root {
  --bg:#050912;--bg2:#0b1220;--bg3:#111c2e;--bg4:#162138;
  --lime:#c6f135;--lime2:#a8d020;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;
  --text:#f0f6ff;--muted:#64748b;--muted2:#94a3b8;--bdr:rgba(255,255,255,0.06);
  --r:20px;--rS:12px;--H:'Syne',sans-serif;--B:'Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--B);overflow:hidden}
#splash{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;animation:splashOut 0.5s ease 2.4s forwards}
@keyframes splashOut{to{opacity:0;pointer-events:none}}
.sp-wrap{display:flex;flex-direction:column;align-items:center;gap:16px;animation:spIn 0.6s cubic-bezier(.2,0,.2,1) 0.3s both}
@keyframes spIn{from{opacity:0;transform:scale(0.85) translateY(24px)}to{opacity:1;transform:none}}
.sp-icon{width:96px;height:96px;background:var(--lime);border-radius:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 0 rgba(198,241,53,0.4);animation:iconPulse 1.6s ease-in-out 0.8s infinite}
@keyframes iconPulse{0%,100%{box-shadow:0 0 0 0 rgba(198,241,53,0.4)}50%{box-shadow:0 0 0 20px rgba(198,241,53,0)}}
.sp-icon svg{width:52px;height:52px}
.sp-name{font-family:var(--H);font-size:38px;font-weight:800;letter-spacing:-1px}
.sp-name b{color:var(--lime)}
.sp-tag{font-size:12px;color:var(--muted2);letter-spacing:2.5px;text-transform:uppercase;animation:spIn 0.6s ease 0.8s both}
.sp-bar{width:140px;height:2px;background:var(--bg3);border-radius:99px;overflow:hidden;animation:spIn 0.5s ease 1.1s both}
.sp-fill{height:100%;background:var(--lime);border-radius:99px;animation:fillBar 1.9s cubic-bezier(.4,0,.2,1) 1.1s forwards;width:0}
@keyframes fillBar{to{width:100%}}
#app{height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative}
.tela{flex:1;overflow-y:auto;padding:0 0 76px;display:none;flex-direction:column}
.tela.ativa{display:flex}
.tb{display:flex;flex-direction:column;gap:12px;padding:12px 16px}
nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:100;background:rgba(9,15,28,0.97);backdrop-filter:blur(24px);border-top:1px solid var(--bdr);display:grid;grid-template-columns:repeat(4,1fr);padding-bottom:env(safe-area-inset-bottom)}
.nb{display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;gap:3px;border:none;background:transparent;cursor:pointer;color:var(--muted);font-family:var(--B);font-size:10px;font-weight:500;transition:color 0.2s;position:relative}
.nb-i{font-size:19px;transition:transform 0.2s}
.nb.ativo{color:var(--lime)}
.nb.ativo .nb-i{transform:scale(1.2);filter:drop-shadow(0 0 6px rgba(198,241,53,0.7))}
.nb.ativo::before{content:'';position:absolute;top:0;left:30%;right:30%;height:2px;background:var(--lime);border-radius:0 0 3px 3px}
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:18px;position:relative;overflow:hidden}
.card-lbl{font-size:11px;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px}
.scan-top{padding:20px 16px 12px;display:flex;align-items:center;justify-content:space-between}
.scan-logo{font-family:var(--H);font-size:26px;font-weight:800}
.scan-logo b{color:var(--lime)}
.counter-pill{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:99px;background:rgba(198,241,53,0.1);border:1px solid rgba(198,241,53,0.2);font-size:12px;font-weight:600;color:var(--lime)}
.counter-dot{width:6px;height:6px;border-radius:50%;background:var(--lime);animation:blink 2s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
#scanner-wrap{margin:0 16px;border-radius:24px;overflow:hidden;background:var(--bg2);position:relative;aspect-ratio:1;border:1px solid var(--bdr);box-shadow:0 24px 80px rgba(0,0,0,0.6)}
#video{width:100%;height:100%;object-fit:cover;display:none}
#placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.ph-ring{width:88px;height:88px;border-radius:50%;border:2px dashed rgba(198,241,53,0.25);display:flex;align-items:center;justify-content:center;font-size:38px;animation:rotateSlow 12s linear infinite}
@keyframes rotateSlow{to{transform:rotate(360deg)}}
#placeholder p{font-size:14px;color:var(--muted2);text-align:center;padding:0 32px;line-height:1.6}
#frame-overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;pointer-events:none}
.sf{width:56%;aspect-ratio:1;position:relative}
.sf::before,.sf::after,.sf-br,.sf-bl{content:'';position:absolute;width:22px;height:22px;border-color:var(--lime);border-style:solid;filter:drop-shadow(0 0 6px rgba(198,241,53,0.9))}
.sf::before{top:0;left:0;border-width:3px 0 0 3px;border-radius:5px 0 0 0}
.sf::after{top:0;right:0;border-width:3px 3px 0 0;border-radius:0 5px 0 0}
.sf-br{bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 5px 0}
.sf-bl{bottom:0;left:0;border-width:0 0 3px 3px;border-radius:0 0 0 5px}
.sf-line{position:absolute;left:0;right:0;height:2px;top:0;background:linear-gradient(90deg,transparent,var(--lime),transparent);animation:scanAnim 2s ease-in-out infinite;box-shadow:0 0 14px rgba(198,241,53,0.8)}
@keyframes scanAnim{0%{top:4px;opacity:1}88%{top:calc(100% - 4px);opacity:1}100%{top:calc(100% - 4px);opacity:0}}
#status-box{margin:12px 16px 0;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:12px;transition:border-color 0.3s,background 0.3s}
#status-box.ok{border-color:rgba(34,197,94,0.4);background:rgba(34,197,94,0.06)}
#status-box.error{border-color:rgba(239,68,68,0.4);background:rgba(239,68,68,0.06)}
#status-box.warn{border-color:rgba(245,158,11,0.4);background:rgba(245,158,11,0.06)}
#status-box.load{border-color:rgba(198,241,53,0.2)}
#s-icon{font-size:28px;flex-shrink:0}
#s-title{font-size:15px;font-weight:700}
#s-msg{font-size:12px;color:var(--muted2);margin-top:2px;line-height:1.4}
#btn-main{margin:12px 16px 0;width:calc(100% - 32px);padding:18px;border-radius:var(--r);border:none;font-size:16px;font-weight:700;font-family:var(--H);cursor:pointer;letter-spacing:0.5px;background:var(--lime);color:var(--bg);box-shadow:0 8px 32px rgba(198,241,53,0.2);transition:opacity 0.15s,transform 0.1s}
#btn-main:active{opacity:0.9;transform:scale(0.98)}
#btn-main.stop{background:var(--bg3);color:var(--muted2);border:1px solid var(--bdr);box-shadow:none}
#scan-hist{display:flex;flex-direction:column;gap:7px;padding:12px 16px 0}
.hist-item{display:flex;align-items:center;gap:10px;padding:9px 13px;background:var(--bg2);border-radius:12px;border:1px solid var(--bdr);font-size:12px;color:var(--muted2)}
.hdot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.hdot.dup{background:var(--amber)}
.hist-item span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dash-hero{padding:28px 20px 22px;position:relative;overflow:hidden;background:linear-gradient(145deg,#0c1e3a 0%,#060f20 100%)}
.dash-hero::before{content:'';position:absolute;top:-80px;right:-80px;width:260px;height:260px;background:radial-gradient(circle,rgba(198,241,53,0.06) 0%,transparent 65%);pointer-events:none}
.dh-label{font-size:11px;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:2px}
.dh-val{font-family:var(--H);font-size:46px;font-weight:800;letter-spacing:-2px;line-height:1;margin:6px 0 2px}
.dh-val .rs{font-size:24px;color:var(--muted2);vertical-align:super}
.dh-sub{font-size:13px;color:var(--muted2)}
.dh-chips{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:99px;font-size:11px;font-weight:600}
.chip-lime{background:rgba(198,241,53,0.12);color:var(--lime);border:1px solid rgba(198,241,53,0.2)}
.grupos-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.grupo-card{border-radius:16px;padding:14px 12px;display:flex;flex-direction:column;gap:6px;border:1px solid var(--bdr);background:var(--bg2)}
.grupo-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.grupo-nome{font-size:11px;font-weight:600;color:var(--muted2)}
.grupo-val{font-family:var(--H);font-size:15px;font-weight:800}
.grupo-pct{font-size:10px;color:var(--muted2)}
.grupo-bar{height:3px;border-radius:99px;background:var(--bg3);overflow:hidden;margin-top:2px}
.grupo-bar-fill{height:100%;border-radius:99px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.mes-row{display:flex;align-items:center;padding:14px 0;border-bottom:1px solid var(--bdr);cursor:pointer;transition:background 0.15s;gap:12px;border-radius:var(--rS)}
.mes-row:last-child{border-bottom:none}
.mes-row:active{background:var(--bg3)}
.mes-dot{width:8px;height:8px;border-radius:50%;background:var(--lime);flex-shrink:0}
.mes-info{flex:1}
.mes-nome{font-size:14px;font-weight:600}
.mes-sub{font-size:11px;color:var(--muted2);margin-top:1px}
.mes-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.mes-val{font-family:var(--H);font-size:15px;font-weight:800;color:var(--lime)}
.mes-arrow{font-size:11px;color:var(--muted)}
.ins-head{padding:22px 16px 4px}
.ins-title{font-family:var(--H);font-size:28px;font-weight:800}
.ins-sub{font-size:13px;color:var(--muted2);margin-top:2px}
.insight-card{display:flex;align-items:flex-start;gap:14px;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:16px}
.insight-card.alerta{border-color:rgba(239,68,68,0.3);background:rgba(239,68,68,0.04)}
.insight-card.economia{border-color:rgba(34,197,94,0.3);background:rgba(34,197,94,0.04)}
.insight-card.info{border-color:rgba(198,241,53,0.15)}
.ic-icon{font-size:26px;flex-shrink:0;margin-top:1px}
.ic-text{font-size:14px;line-height:1.6;color:var(--text)}
.hist-head{padding:22px 16px 4px}
.hist-title{font-family:var(--H);font-size:28px;font-weight:800}
.nota-item{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;cursor:pointer;transition:border-color 0.2s,transform 0.15s;overflow:hidden;position:relative}
.nota-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--lime);border-radius:0 3px 3px 0;transform:scaleY(0);transition:transform 0.2s}
.nota-item:active{transform:scale(0.99);border-color:rgba(198,241,53,0.3)}
.nota-item:active::before{transform:scaleY(1)}
.nota-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.nota-nome{font-size:15px;font-weight:700;flex:1}
.nota-val{font-family:var(--H);font-size:16px;font-weight:800;color:var(--lime);white-space:nowrap}
.nota-meta{font-size:12px;color:var(--muted2);margin-top:4px}
.nota-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
#modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.8);backdrop-filter:blur(6px);display:none;align-items:flex-end}
#modal-overlay.open{display:flex}
#modal{background:var(--bg2);border-radius:28px 28px 0 0;width:100%;max-height:86vh;overflow-y:auto;border-top:1px solid var(--bdr);animation:slideUp 0.32s cubic-bezier(.2,0,.2,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-drag{width:36px;height:3px;background:var(--bg4);border-radius:99px;margin:14px auto 0}
.mes-detail-head{padding:18px 20px 14px;border-bottom:1px solid var(--bdr)}
.mes-detail-title{font-family:var(--H);font-size:22px;font-weight:800}
.mes-detail-sub{font-size:13px;color:var(--muted2);margin-top:3px}
.mes-detail-total{font-family:var(--H);font-size:36px;color:var(--lime);padding:16px 20px 12px;border-bottom:1px solid var(--bdr)}
.grupo-section{padding:14px 20px 0}
.grupo-section-title{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;margin-bottom:10px}
.gs-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.gs-total{margin-left:auto;font-family:var(--H);font-size:14px}
.cat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bdr);font-size:13px}
.cat-row:last-child{border-bottom:none;padding-bottom:14px}
.cat-name{color:var(--muted2)}
.cat-val{font-weight:600}
.modal-nota-head{padding:18px 20px 14px;border-bottom:1px solid var(--bdr)}
.modal-emitente{font-family:var(--H);font-size:20px;font-weight:800}
.modal-sub{font-size:12px;color:var(--muted2);margin-top:3px}
.modal-total{font-family:var(--H);font-size:36px;color:var(--lime);padding:16px 20px 12px;border-bottom:1px solid var(--bdr)}
.modal-items-lbl{font-size:11px;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:1.5px;padding:14px 20px 8px}
.item-row{display:flex;align-items:center;justify-content:space-between;padding:11px 20px;border-bottom:1px solid var(--bdr);gap:12px}
.item-row:last-child{border-bottom:none}
.item-desc{font-size:14px;font-weight:500}
.item-cat{font-size:11px;color:var(--muted2);margin-top:2px}
.item-price{font-size:14px;font-weight:700;color:var(--lime);white-space:nowrap}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(198,241,53,0.2);border-top-color:var(--lime);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
.big-spinner{width:30px;height:30px;border:3px solid rgba(198,241,53,0.12);border-top-color:var(--lime);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-state{display:flex;flex-direction:column;align-items:center;gap:12px;padding:48px 20px;color:var(--muted2);font-size:13px}
.empty{text-align:center;padding:40px 20px;color:var(--muted2);font-size:14px;line-height:1.6}
.empty-icon{font-size:44px;margin-bottom:12px;opacity:0.25}
::-webkit-scrollbar{width:0}
</style>
</head>
<body>
<div id="splash">
  <div class="sp-wrap">
    <div class="sp-icon">
      <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="8" y="4" width="28" height="36" rx="4" fill="#050912"/>
        <path d="M14 14h16M14 20h16M14 26h10" stroke="#c6f135" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="38" cy="36" r="9" fill="#c6f135"/>
        <path d="M34 36l2.5 2.5L42 33" stroke="#050912" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="sp-name">Nota<b>Fácil</b></div>
  </div>
  <div class="sp-tag">Controle financeiro inteligente</div>
  <div class="sp-bar"><div class="sp-fill"></div></div>
</div>
<div id="app">
  <div id="tela-scanner" class="tela ativa">
    <div class="scan-top">
      <div class="scan-logo">Nota<b>Fácil</b></div>
      <div class="counter-pill"><div class="counter-dot"></div><span id="counter">0 notas</span></div>
    </div>
    <div id="scanner-wrap">
      <div id="placeholder">
        <div class="ph-ring">🧾</div>
        <p>Toque em Iniciar e aponte para o QR Code do cupom fiscal</p>
      </div>
      <video id="video" autoplay playsinline muted></video>
      <div id="frame-overlay"><div class="sf"><div class="sf-br"></div><div class="sf-bl"></div><div class="sf-line"></div></div></div>
    </div>
    <div id="status-box">
      <div id="s-icon">🎯</div>
      <div><div id="s-title">Pronto para escanear</div><div id="s-msg">Aponte para o QR Code da nota fiscal</div></div>
    </div>
    <button id="btn-main" onclick="toggle()">&#9654; INICIAR SCANNER</button>
    <div id="scan-hist"></div>
  </div>
  <div id="tela-dash" class="tela">
    <div class="dash-hero">
      <div class="dh-label">Total do mês</div>
      <div class="dh-val"><span class="rs">R$</span> <span class="num" id="dash-total">—</span></div>
      <div class="dh-sub" id="dash-notas">Carregando...</div>
      <div class="dh-chips"><span class="chip chip-lime" id="dash-periodo">—</span></div>
    </div>
    <div class="tb">
      <div class="card">
        <div class="card-lbl">Distribuição de gastos</div>
        <div class="grupos-row" id="dash-grupos"><div class="loading-state" style="grid-column:1/-1"><div class="big-spinner"></div></div></div>
      </div>
      <div class="card">
        <div class="card-lbl">Histórico mensal <span style="font-size:10px;color:var(--muted)">· toque para detalhar</span></div>
        <div id="dash-hist"><div class="loading-state"><div class="big-spinner"></div></div></div>
      </div>
    </div>
  </div>
  <div id="tela-insights" class="tela">
    <div class="ins-head"><div class="ins-title">Insights</div><div class="ins-sub">Análise inteligente do seu consumo</div></div>
    <div class="tb" id="insights-list"><div class="loading-state"><div class="big-spinner"></div>Analisando seus dados...</div></div>
  </div>
  <div id="tela-hist" class="tela">
    <div class="hist-head"><div class="hist-title">Notas</div><div class="ins-sub">Histórico de compras</div></div>
    <div class="tb" id="hist-list"><div class="loading-state"><div class="big-spinner"></div>Carregando notas...</div></div>
  </div>
  <nav>
    <button class="nb ativo" onclick="irPara('scanner',this)"><span class="nb-i">📷</span>Scanner</button>
    <button class="nb" onclick="irPara('dash',this)"><span class="nb-i">📊</span>Dashboard</button>
    <button class="nb" onclick="irPara('insights',this)"><span class="nb-i">💡</span>Insights</button>
    <button class="nb" onclick="irPara('hist',this)"><span class="nb-i">🧾</span>Notas</button>
  </nav>
</div>
<div id="modal-overlay" onclick="fecharModal(event)">
  <div id="modal"><div class="modal-drag"></div><div id="modal-content"></div></div>
</div>
<script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"></script>
<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbxTeyZZIdIml2DRufK8jCDe1ZP8g4bsgVuiV4FhuTQ0jw-x-qF_25GcPttYYjxAlzWt_Q/exec';
const GC={'Essencial':{cor:'#22c55e'},'Complementar':{cor:'#f59e0b'},'Supérfluo':{cor:'#ef4444'}};
const MESES=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const carregado={};

function irPara(id,btn){
  document.querySelectorAll('.tela').forEach(t=>t.classList.remove('ativa'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('ativo'));
  document.getElementById('tela-'+id).classList.add('ativa');
  btn.classList.add('ativo');
  if(!carregado[id]){carregado[id]=true;if(id==='dash')carregarDash();if(id==='insights')carregarInsights();if(id==='hist')carregarHist();}
}

let stream=null,scanning=false,raf=null,count=0;
const canvas=document.createElement('canvas');
const ctx=canvas.getContext('2d',{willReadFrequently:true});
const video=document.getElementById('video');

function setStatus(type,icon,title,msg){
  document.getElementById('status-box').className=type;
  document.getElementById('s-icon').innerHTML=icon;
  document.getElementById('s-title').textContent=title;
  document.getElementById('s-msg').innerHTML=msg;
}
function toggle(){if(scanning||stream)stopScanner();else startScanner();}

async function startScanner(){
  setStatus('load','⏳','Abrindo câmera...','Aguarde um momento');
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}});
    video.srcObject=stream;
    video.onloadedmetadata=()=>{
      video.play();video.style.display='block';
      document.getElementById('placeholder').style.display='none';
      document.getElementById('frame-overlay').style.display='flex';
    };
    document.getElementById('btn-main').textContent='⏹ PARAR SCANNER';
    document.getElementById('btn-main').classList.add('stop');
    scanning=true;
    setStatus('load','🔍','Escaneando...','Aponte para o QR Code da nota');
    loop();
  }catch(e){setStatus('error','❌','Erro na câmera','Verifique as permissões do navegador');}
}

function stopScanner(){
  scanning=false;
  if(raf)cancelAnimationFrame(raf);
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  video.style.display='none';
  document.getElementById('placeholder').style.display='flex';
  document.getElementById('frame-overlay').style.display='none';
  document.getElementById('btn-main').textContent='▶ INICIAR SCANNER';
  document.getElementById('btn-main').classList.remove('stop');
  setStatus('','🎯','Pronto para escanear','Aponte para o QR Code da nota fiscal');
}

function loop(){
  if(!scanning)return;
  if(video.readyState===video.HAVE_ENOUGH_DATA){
    canvas.width=video.videoWidth;canvas.height=video.videoHeight;
    ctx.drawImage(video,0,0);
    try{
      const img=ctx.getImageData(0,0,canvas.width,canvas.height);
      const code=jsQR(img.data,img.width,img.height,{inversionAttempts:'dontInvert'});
      if(code&&code.data&&code.data.startsWith('http')){scanning=false;handleQR(code.data);return;}
    }catch(e){}
  }
  raf=requestAnimationFrame(loop);
}

async function handleQR(url){
  stopScanner();
  setStatus('load','<span class="spinner"></span>','QR lido!','Classificando e salvando...');
  try{
    const resp=await fetch(SCRIPT_URL+'?acao=salvar&url='+encodeURIComponent(url));
    const data=await resp.json();
    if(data.status==='ok'){
      count++;
      document.getElementById('counter').textContent=count+(count===1?' nota':' notas');
      setStatus('ok','✅','Nota salva!','Produtos classificados por grupo!');
      addScanHist(url,false);
      carregado['dash']=false;carregado['insights']=false;carregado['hist']=false;
    }else if(data.status==='duplicado'){
      setStatus('warn','⚠️','Nota duplicada','Esta nota já foi registrada.');
      addScanHist(url,true);
    }else{setStatus('error','❌','Erro ao salvar','Tente escanear novamente.');}
  }catch(e){setStatus('error','❌','Sem conexão','Verifique sua internet.');}
}

function addScanHist(url,dup){
  const hist=document.getElementById('scan-hist');
  const el=document.createElement('div');
  el.className='hist-item';
  const s=url.length>48?url.substring(0,48)+'...':url;
  el.innerHTML='<div class="hdot'+(dup?' dup':'')+'"></div><span>'+s+'</span>';
  hist.prepend(el);
  while(hist.children.length>3)hist.removeChild(hist.lastChild);
}

async function carregarDash(){
  try{
    const resp=await fetch(SCRIPT_URL+'?acao=relatorio');
    const data=await resp.json();
    if(data.status!=='ok')return;
    const[ano,mes]=data.mesAtual.split('-');
    document.getElementById('dash-periodo').textContent=MESES[parseInt(mes)-1]+' '+ano;
    const total=(data.totalMesAtual||0);
    const[r,c]=total.toFixed(2).split('.');
    document.getElementById('dash-total').textContent=parseInt(r).toLocaleString('pt-BR')+','+c;
    document.getElementById('dash-notas').textContent=(data.notasMesAtual||0)+' notas escaneadas';
    const grupos=data.grupos||{Essencial:0,Complementar:0,'Supérfluo':0};
    const tg=Object.values(grupos).reduce((a,b)=>a+b,0)||1;
    document.getElementById('dash-grupos').innerHTML=Object.entries(grupos).map(([nome,val])=>{
      const cor=(GC[nome]||{cor:'#64748b'}).cor;
      const pct=tg>0?(val/tg*100).toFixed(0):0;
      return '<div class="grupo-card"><div style="display:flex;align-items:center;gap:6px"><div class="grupo-dot" style="background:'+cor+'"></div><div class="grupo-nome">'+nome+'</div></div><div class="grupo-val" style="color:'+cor+'">R$ '+val.toFixed(2).replace('.',',')+'</div><div class="grupo-pct">'+pct+'% do total</div><div class="grupo-bar"><div class="grupo-bar-fill" style="width:'+pct+'%;background:'+cor+'"></div></div></div>';
    }).join('');
    const hist=Object.entries(data.historico||{}).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,6);
    const histEl=document.getElementById('dash-hist');
    if(!hist.length){histEl.innerHTML='<div class="empty"><div class="empty-icon">📅</div>Nenhum histórico ainda</div>';}
    else{
      histEl.innerHTML=hist.map(([chave,info])=>{
        const[a,m]=chave.split('-');
        return '<div class="mes-row" onclick="abrirDetalhe(''+chave+'',''+MESES[parseInt(m)-1]+' '+a+'','+info.total.toFixed(2)+')"><div class="mes-dot"></div><div class="mes-info"><div class="mes-nome">'+MESES[parseInt(m)-1]+' '+a+'</div><div class="mes-sub">'+info.notas+' nota'+(info.notas!==1?'s':'')+'</div></div><div class="mes-right"><div class="mes-val">R$ '+info.total.toFixed(2).replace('.',',')+'</div><div class="mes-arrow">ver detalhes ›</div></div></div>';
      }).join('');
    }
  }catch(e){document.getElementById('dash-grupos').innerHTML='<div class="empty" style="grid-column:1/-1">Erro ao carregar.</div>';}
}

async function abrirDetalhe(mes,nome,total){
  document.getElementById('modal-content').innerHTML='<div class="mes-detail-head"><div class="mes-detail-title">'+nome+'</div><div class="mes-detail-sub">Detalhamento por grupo</div></div><div class="mes-detail-total">R$ '+parseFloat(total).toFixed(2).replace('.',',')+'</div><div class="loading-state"><div class="big-spinner"></div>Carregando...</div>';
  document.getElementById('modal-overlay').classList.add('open');
  try{
    const resp=await fetch(SCRIPT_URL+'?acao=detalhe&mes='+mes);
    const data=await resp.json();
    if(data.status!=='ok')return;
    let html='';
    for(const[grupo,info] of Object.entries(data.grupos||{})){
      const cor=(GC[grupo]||{cor:'#64748b'}).cor;
      const cats=Object.entries(info.categorias||{}).sort((a,b)=>b[1]-a[1]);
      if(info.total===0&&!cats.length)continue;
      html+='<div class="grupo-section"><div class="grupo-section-title"><div class="gs-dot" style="background:'+cor+'"></div><span>'+grupo+'</span><div class="gs-total" style="color:'+cor+'">R$ '+info.total.toFixed(2).replace('.',',')+'</div></div>'+cats.map(([cat,val])=>'<div class="cat-row"><span class="cat-name">'+cat+'</span><span class="cat-val">R$ '+val.toFixed(2).replace('.',',')+'</span></div>').join('')+'</div>';
    }
    document.getElementById('modal-content').innerHTML='<div class="mes-detail-head"><div class="mes-detail-title">'+nome+'</div><div class="mes-detail-sub">Detalhamento por grupo</div></div><div class="mes-detail-total">R$ '+parseFloat(total).toFixed(2).replace('.',',')+'</div>'+(html||'<div class="empty">Nenhum dado disponível</div>');
  }catch(e){}
}

async function carregarInsights(){
  const el=document.getElementById('insights-list');
  try{
    const resp=await fetch(SCRIPT_URL+'?acao=insights');
    const data=await resp.json();
    if(data.status!=='ok'||!data.insights.length){el.innerHTML='<div class="empty"><div class="empty-icon">💡</div>Escaneie mais notas para ver insights!</div>';return;}
    const total=data.totalAtual||0;
    const g=data.grupoAtual||{};
    let resumo='';
    if(total>0){
      resumo='<div class="card"><div class="card-lbl">Este mês em resumo</div><div style="display:flex;flex-direction:column;gap:8px">'+Object.entries(g).map(([nome,val])=>{const cor=(GC[nome]||{cor:'#64748b'}).cor;const pct=total>0?(val/total*100).toFixed(0):0;return '<div style="display:flex;align-items:center;gap:10px"><div style="width:10px;height:10px;border-radius:50%;background:'+cor+';flex-shrink:0"></div><div style="flex:1;font-size:13px">'+nome+'</div><div style="font-size:13px;font-weight:700;color:'+cor+'">R$ '+val.toFixed(2).replace('.',',')+' <span style="font-size:11px;color:var(--muted2)">('+pct+'%)</span></div></div>';}).join('')+'</div></div>';
    }
    el.innerHTML=resumo+data.insights.map(ins=>'<div class="insight-card '+ins.tipo+'"><div class="ic-icon">'+ins.icone+'</div><div class="ic-text">'+ins.mensagem+'</div></div>').join('');
  }catch(e){el.innerHTML='<div class="empty">Erro ao carregar insights.</div>';}
}

async function carregarHist(){
  const el=document.getElementById('hist-list');
  try{
    const resp=await fetch(SCRIPT_URL+'?acao=historico');
    const data=await resp.json();
    if(data.status!=='ok'||!data.notas.length){el.innerHTML='<div class="empty"><div class="empty-icon">🧾</div>Nenhuma nota ainda.<br>Escaneie seu primeiro cupom!</div>';return;}
    el.innerHTML=data.notas.map(nota=>{
      const dt=nota.data?new Date(nota.data).toLocaleDateString('pt-BR'):'—';
      const grupos=[...new Set((nota.itens||[]).map(i=>i.grupo))].filter(Boolean);
      const total=parseFloat(nota.total||0).toFixed(2).replace('.',',');
      const enc=JSON.stringify(nota).replace(/"/g,'&quot;');
      return '<div class="nota-item" onclick="abrirNota('+enc+')"><div class="nota-top"><div class="nota-nome">'+(nota.emitente||'Estabelecimento')+'</div><div class="nota-val">R$ '+total+'</div></div><div class="nota-meta">'+dt+' · '+(nota.itens||[]).length+' itens</div>'+(grupos.length?'<div class="nota-tags">'+grupos.map(g=>{const cor=(GC[g]||{cor:'#64748b'}).cor;return '<span class="chip" style="background:'+cor+'20;color:'+cor+';border:1px solid '+cor+'30">'+g+'</span>';}).join('')+'</div>':'')+'</div>';
    }).join('');
  }catch(e){el.innerHTML='<div class="empty">Erro ao carregar histórico.</div>';}
}

function abrirNota(nota){
  const total=parseFloat(nota.total||0).toFixed(2).replace('.',',');
  const dt=nota.data?new Date(nota.data).toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'}):'—';
  const itens=nota.itens||[];
  document.getElementById('modal-content').innerHTML='<div class="modal-nota-head"><div class="modal-emitente">'+(nota.emitente||'Estabelecimento')+'</div><div class="modal-sub">'+dt+(nota.cnpj?' · '+nota.cnpj:'')+'</div></div><div class="modal-total">R$ '+total+'</div><div class="modal-items-lbl">'+itens.length+' itens</div>'+(!itens.length?'<div class="empty">Detalhes não disponíveis</div>':itens.map(it=>{const cor=(GC[it.grupo]||{cor:'#64748b'}).cor;return '<div class="item-row"><div style="flex:1"><div class="item-desc">'+it.descricao+'</div><div class="item-cat" style="color:'+cor+'">'+(it.grupo||'')+' · '+(it.categoria||'')+' · '+it.qtd+'x R$ '+parseFloat(it.valorUnit||0).toFixed(2).replace('.',',')+'</div></div><div class="item-price">R$ '+parseFloat(it.valorTotal||0).toFixed(2).replace('.',',')+'</div></div>';}).join(''));
  document.getElementById('modal-overlay').classList.add('open');
}

function fecharModal(e){
  if(e.target===document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.remove('open');
}
