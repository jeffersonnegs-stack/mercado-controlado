<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NFC-e Gestor</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h2>📱 NFC-e Gestor</h2>
  <button onclick="abrirScanner()">📷 Escanear NFC-e</button>
  <div id="reader" style="display:none; width:100%"></div>
  <div id="status"></div>
  <button onclick="window.location.href='painel.html'">📈 Ver Dashboard</button>
</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="script.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }

  let scanner = null;

  function abrirScanner() {
    const div = document.getElementById("reader");
    div.style.display = "block";

    scanner = new Html5Qrcode("reader");
    scanner.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: 250 },
      async (url) => {
        await scanner.stop();
        div.style.display = "none";
        document.getElementById("status").textContent = "⏳ Processando...";
        const result = await processarNota(url);
        document.getElementById("status").textContent = result
          ? "✅ Nota salva! " + (result.dados?.itens || '') + " itens"
          : "❌ Falha ao processar";
      }
    );
  }
</script>
</body>
</html>
