<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>NFC-e</title>
</head>
<body>

<h2>📷 Ler Nota Fiscal</h2>

<video id="camera" width="300" autoplay></video>

<br><br>

<input id="url" placeholder="URL da nota">
<button onclick="enviar()">Enviar Nota</button>

<script src="script.js"></script>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>
  function iniciarScanner() {
    const scanner = new Html5Qrcode("camera");

    scanner.start(
      { facingMode: "environment" },
      {
        fps: 10,
        qrbox: 250
      },
      (decodedText) => {
        document.getElementById("url").value = decodedText;
        scanner.stop();
      }
    );
  }

  iniciarScanner();
</script>

</body>
</html>
